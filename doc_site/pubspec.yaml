name: doc_site
description: A documentation site built with Jaspr
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  jaspr: ^0.23.1
  jaspr_content: ^0.5.2
  jaspr_router: ^0.8.2
  open_xml:
    path: ../
  web_file_system:
    path: ../third_party/web_file_system
  file: ^7.0.0
  web: any

dev_dependencies:
  build_runner: ^2.10.0
  jaspr_builder: ^0.23.1
  jaspr_test: ^0.23.1
  lints: ^6.0.0

jaspr:
  mode: static
