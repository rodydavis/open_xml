name: Build and Deploy

on:
  push:
    branches: ["main", "master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: git.rodydavis.dev
  CUSTOM_SUBDOMAIN: ""

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Set up Bazel (Bazelisk)
        run: npm install -g @bazel/bazelisk

      - name: Verify Hermetic Bazel Build
        run: bazel build //...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.GIT_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ gitea.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Coolify via Middleware
        run: |
          curl --fail-with-body --request POST 'https://sync-middleware.rodydavis.dev/deploy' \
            --header 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}' \
            --header 'Content-Type: application/json' \
            --data '{
              "repo": "${{ gitea.repository }}",
              "subdomain": "${{ env.CUSTOM_SUBDOMAIN }}"
            }'

